description: >-
  FinOps view of Steel Cloud spend. Steel bills a recurring subscription per
  tier with included browser-hour, proxy-bandwidth, and CAPTCHA-solve
  allotments; the dominant usage meter is browser hours (wall-clock time a
  cloud browser session is live). Proxy bandwidth and CAPTCHA solves are
  secondary metered dimensions. Steel is open source (Apache-2.0), so
  self-hosting shifts cost from Steel Cloud subscription to the operator's own
  compute, proxy, and CAPTCHA infrastructure.
notes: >-
  Plan allotments and the per-browser-hour model are captured from the Steel
  pricing page; verify current overage rates and allotments during
  reconciliation.
sources:
- https://steel.dev/pricing
- https://docs.steel.dev
- https://github.com/steel-dev/steel-browser
