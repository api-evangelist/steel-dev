aid: steel-dev
url: https://raw.githubusercontent.com/api-evangelist/steel-dev/refs/heads/main/apis.yml
name: Steel
kind: company
description: Steel is the open-source browser API for AI agents and apps. The Steel
  Cloud REST API (https://api.steel.dev/v1) launches and manages cloud browser sessions,
  runs stateless quick actions (scrape, screenshot, pdf, search), and exposes a live
  session viewer, while long-running automation connects to a per-session Chrome
  DevTools Protocol (CDP) WebSocket driven with Playwright, Puppeteer, or Selenium.
  The same surface ships self-hosted under Apache-2.0 as steel-browser.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Browser
- Web Automation
- Scraping
- AI Agents
- Open Source
created: '2026-06-20'
modified: '2026-06-20'
