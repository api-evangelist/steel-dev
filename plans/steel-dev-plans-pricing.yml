specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Steel
providerId: steel-dev
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- Browser
- Web Automation
- Scraping
- AI Agents
- Open Source
- Plans
description: >-
  Steel Cloud uses recurring subscription tiers metered primarily in browser
  hours, with bundled proxy bandwidth and CAPTCHA solves. The Hobby tier is
  free and includes a monthly credit allotment plus 100 browser hours; paid
  tiers raise included browser hours, proxy bandwidth, and CAPTCHA solves;
  Enterprise adds dedicated clusters, higher limits, and discounted rates.
  Steel is also fully open source (Apache-2.0) via the steel-browser server,
  which can be self-hosted with no Steel Cloud usage charges.
notes: >-
  Plan inclusions captured from the Steel pricing page (browser hours, proxy
  bandwidth, CAPTCHA solves). Annual billing is discounted ~20% vs monthly.
  Verify current allotments and overage/per-browser-hour rates on the pricing
  page during reconciliation.
sources:
- https://steel.dev/pricing
- https://docs.steel.dev
- https://github.com/steel-dev/steel-browser
